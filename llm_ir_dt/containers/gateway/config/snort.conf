
# config/snort.conf：Snort 基础配置，定义 HOME_NET、规则目录、输出位置
# Snort configuration for the digital twin gateway
var HOME_NET [10.0.1.0/24,10.0.2.0/24]
# 把客户端网段和服务器网段都定义成内部网络                                                                                                         
# 后面的规则里凡是写 $HOME_NET，就是这两个网段
var EXTERNAL_NET any
# - 外部网络先简单设为任意 
var RULE_PATH /etc/snort/rules

# IP 分片重组相关预处理器
# Preprocessors
preprocessor frag3_global: max_frags 65536
preprocessor frag3_engine: policy first

# Output
# 用 fast alert 格式写到 /var/log/snort/alert
output alert_fast: /var/log/snort/alert

# Rules
# 加载本项目自己的规则 
include $RULE_PATH/local.rules
